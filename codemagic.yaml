workflows:
  ios-passdmv:
    name: Pass DMV iOS (App Store)
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: PassDMV_ASC_Key
    environment:
      groups:
        - ios-signing
      vars:
        BUNDLE_ID: "com.passdmv.app"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_STORE_APPLE_ID: 6784378286
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: |
          npm install --legacy-peer-deps
      - name: Generate native iOS project
        script: |
          if [ ! -d "ios" ]; then npx cap add ios; fi
          npx cap sync ios
      - name: Remove Game Center entitlement (not used by this app)
        script: |
          ENTITLEMENTS="ios/App/App/App.entitlements"
          if [ -f "$ENTITLEMENTS" ]; then
            /usr/libexec/PlistBuddy -c "Delete :com.apple.developer.game-center" "$ENTITLEMENTS" 2>/dev/null || true
          fi
      - name: Generate app icon and splash
        script: |
          npx capacitor-assets generate --ios || true
      - name: Set app display name (Pass DMV)
        script: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName Pass DMV" "ios/App/App/Info.plist" || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string Pass DMV" "ios/App/App/Info.plist"
      - name: Install CocoaPods dependencies
        script: |
          cd ios/App && pod install
      - name: Revoke old Distribution certificates (one-time cleanup + ongoing guard)
        script: |
          set +e
          keychain initialize
          for CERT_ID in Z6T2646N57 5T68W847ZF; do
            echo "Revoking $CERT_ID"
            app-store-connect certificates revoke "$CERT_ID" 2>/dev/null || true
          done
          app-store-connect list-certificates --type DISTRIBUTION --json 2>/dev/null > /tmp/dist_certs.json || echo "[]" > /tmp/dist_certs.json
          TOTAL=$(python3 -c "import json; print(len(json.load(open('/tmp/dist_certs.json'))))" 2>/dev/null || echo "0")
          echo "Remaining Distribution certs: $TOTAL"
          if [ "$TOTAL" -ge 2 ]; then
            python3 -c "import json; certs=json.load(open('/tmp/dist_certs.json')); [print(c['id']) for c in sorted(certs, key=lambda x: x.get('attributes',{}).get('expirationDate',''))[:-1]]" 2>/dev/null > /tmp/to_revoke.txt
            while IFS= read -r cert_id; do
              [ -z "$cert_id" ] && continue
              echo "Revoking overflow: $cert_id"
              app-store-connect certificates revoke "$cert_id" || true
            done < /tmp/to_revoke.txt
          fi
          set -e
      - name: Set up code signing (create cert + profile)
        script: |
          keychain initialize
          echo "$CERT_PRIVATE_KEY_B64" | base64 --decode > /tmp/dist_cert_key.pem
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/dist_cert_key.pem \
            --create
          keychain add-certificates
          PROFILE=$(find "$HOME/Library" -name "*.mobileprovision" 2>/dev/null | head -1)
          echo "Profile: $PROFILE"
          if [ -z "$PROFILE" ]; then echo "ERROR: no .mobileprovision found"; exit 1; fi
          PLIST=$(openssl smime -inform der -verify -noverify -in "$PROFILE" 2>/dev/null)
          PROFILE_UUID=$(echo "$PLIST" | python3 -c "import plistlib,sys; print(plistlib.load(sys.stdin.buffer)['UUID'])")
          TEAM_ID=$(echo "$PLIST" | python3 -c "import plistlib,sys; print(plistlib.load(sys.stdin.buffer)['TeamIdentifier'][0])")
          echo "UUID=$PROFILE_UUID  TEAM=$TEAM_ID"
          echo "export PROFILE_UUID='$PROFILE_UUID'" > /tmp/signing.env
          echo "export TEAM_ID='$TEAM_ID'" >> /tmp/signing.env
          sed -i '' "s/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g" ios/App/App.xcodeproj/project.pbxproj 2>/dev/null || true
          xcode-project use-profiles
      - name: Increment build number
        script: |
          cd ios/App
          agvtool new-version -all $(($(date +%s) / 60)) || true
      - name: Build the IPA
        script: |
          source /tmp/signing.env
          echo "UUID=$PROFILE_UUID  TEAM=$TEAM_ID"
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --archive-flags "CODE_SIGN_STYLE=Manual CODE_SIGN_IDENTITY=Apple\ Distribution PROVISIONING_PROFILE=$PROFILE_UUID DEVELOPMENT_TEAM=$TEAM_ID"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
