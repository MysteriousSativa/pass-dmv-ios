workflows:
  ios-passdmv:
    name: Pass DMV iOS (App Store)
    instance_type: mac_mini_m2
    max_build_duration: 60

    # App Store Connect API key added in Codemagic UI, named exactly: PassDMV_ASC_Key
    integrations:
      app_store_connect: PassDMV_ASC_Key

    environment:
      vars:
        BUNDLE_ID: "com.passdmv.app"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_STORE_APPLE_ID: 6784378286
      node: 20
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Generate native iOS project
        script: |
          if [ ! -d "ios" ]; then npx cap add ios; fi
          npx cap sync ios
      - name: Add Game Center entitlement
        script: |
          ENT="ios/App/App/App.entitlements"
          if [ ! -f "$ENT" ]; then
            printf '%s\n' '<?xml version="1.0" encoding="UTF-8"?>' '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' '<plist version="1.0">' '<dict>' '</dict>' '</plist>' > "$ENT"
          fi
          /usr/libexec/PlistBuddy -c "Add :com.apple.developer.game-center bool true" "$ENT" 2>/dev/null || /usr/libexec/PlistBuddy -c "Set :com.apple.developer.game-center true" "$ENT"
          PBX="ios/App/App.xcodeproj/project.pbxproj"
          if ! grep -q "CODE_SIGN_ENTITLEMENTS" "$PBX"; then
            /usr/bin/perl -0pi -e 's/(PRODUCT_BUNDLE_IDENTIFIER = com\.passdmv\.app;)/$1\n\t\t\t\tCODE_SIGN_ENTITLEMENTS = App\/App.entitlements;/g' "$PBX"
          fi
          echo "--- App.entitlements ---"; cat "$ENT"
          echo "--- pbxproj entitlement refs ---"; grep -n "CODE_SIGN_ENTITLEMENTS" "$PBX" || true
      - name: Generate app icon and splash
        script: |
          npx capacitor-assets generate --ios || true
      - name: Set app display name (Pass DMV)
        script: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName Pass DMV" "ios/App/App/Info.plist" || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string Pass DMV" "ios/App/App/Info.plist"
      - name: Install CocoaPods dependencies
        script: |
          cd ios/App && pod install
      - name: Set up code signing (create cert + profile)
        script: |
          keychain initialize
          # Generate a private key we control. A distribution certificate cannot
          # be created OR used for signing without an accompanying private key,
          # and this account has none locally — so we make one here.
          openssl genrsa -out /tmp/dist_cert_key.pem 2048
          # Create (or reuse) the iOS Distribution certificate from our key and
          # the App Store provisioning profile for our bundle id, downloading
          # both so they can be used to sign the archive.
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/dist_cert_key.pem \
            --create
          # Load the fetched certificate (paired with our private key) into the
          # build keychain.
          keychain add-certificates
          # Patch the Xcode project to use the fetched profile + certificate.
          xcode-project use-profiles
      - name: Increment build number
        script: |
          cd ios/App
          agvtool new-version -all $(($(date +%s) / 60)) || true
      - name: Build the IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
