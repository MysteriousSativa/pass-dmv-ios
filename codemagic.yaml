workflows:
  ios-passdmv:
    name: Pass DMV iOS (App Store)
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: PassDMV_ASC_Key
    environment:
      groups:
        - ios-signing
      vars:
        BUNDLE_ID: "com.passdmv.app"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_STORE_APPLE_ID: 6784378286
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: |
          npm install --legacy-peer-deps
      - name: Generate native iOS project
        script: |
          if [ ! -d "ios" ]; then npx cap add ios; fi
          npx cap sync ios
      - name: Remove Game Center entitlement (not used by this app)
        script: |
          ENTITLEMENTS="ios/App/App/App.entitlements"
          if [ -f "$ENTITLEMENTS" ]; then
            /usr/libexec/PlistBuddy -c "Delete :com.apple.developer.game-center" "$ENTITLEMENTS" 2>/dev/null || true
          fi
      - name: Generate app icon and splash
        script: |
          npx capacitor-assets generate --ios || true
      - name: Set app display name (Pass DMV)
        script: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName Pass DMV" "ios/App/App/Info.plist" || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string Pass DMV" "ios/App/App/Info.plist"
      - name: Install CocoaPods dependencies
        script: |
          cd ios/App && pod install
      - name: Inject iMessage Sticker Pack Extension
        script: |
          EXT_DIR="ios/App/StickerPackExtension"
          mkdir -p "$EXT_DIR/Stickers.xcstickers/iMessage App Icon.stickersiconset"

          cat > "$EXT_DIR/Info.plist" << 'PLISTEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDisplayName</key>
              <string>Conie Stickers</string>
              <key>CFBundleExecutable</key>
              <string>$(EXECUTABLE_NAME)</string>
              <key>CFBundleIdentifier</key>
              <string>$(PRODUCT_BUNDLE_IDENTIFIER)</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>$(PRODUCT_NAME)</string>
              <key>CFBundlePackageType</key>
              <string>XPC!</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>NSExtension</key>
              <dict>
                  <key>NSExtensionPointIdentifier</key>
                  <string>com.apple.message-payload-provider</string>
                  <key>NSExtensionPrincipalClass</key>
                  <string>StickerBrowserViewController</string>
              </dict>
          </dict>
          </plist>
          PLISTEOF

          printf '{"info":{"author":"xcode","version":1},"properties":{"grid-size":"regular"}}' \
            > "$EXT_DIR/Stickers.xcstickers/Contents.json"

          ICON_DIR="$EXT_DIR/Stickers.xcstickers/iMessage App Icon.stickersiconset"
          python3 - << 'PYEOF'
          import struct, zlib, sys, os
          def mk(p, w, h):
              ck = lambda t, data: struct.pack('>I', len(data))+t+data+struct.pack('>I', zlib.crc32(t+data)&0xffffffff)
              row = bytes([0]) + bytes([0x4A, 0x8C, 0xD6]) * w
              png = b'\x89PNG\r\n\x1a\n' + ck(b'IHDR', struct.pack('>IIBBBBB',w,h,8,2,0,0,0)) + ck(b'IDAT', zlib.compress(row*h,1)) + ck(b'IEND', b'')
              with open(p, 'wb') as f: f.write(png)
              print(f'  OK {w}x{h} -> {p} ({len(png)}b)')
          d = 'ios/App/StickerPackExtension/Stickers.xcstickers/iMessage App Icon.stickersiconset'
          icons = [(54,40,'msg-27x20@2x.png'),(81,60,'msg-27x20@3x.png'),(64,48,'msg-32x24@2x.png'),(96,72,'msg-32x24@3x.png'),(120,90,'msg-60x45@2x.png'),(134,100,'msg-67x50@2x.png'),(148,110,'msg-74x55@2x.png'),(180,135,'msg-60x45@3x.png'),(1024,768,'appstore.png')]
          errs = 0
          for w, h, n in icons:
              try: mk(os.path.join(d, n), w, h)
              except Exception as e: print(f'  ERR {n}: {e}', file=sys.stderr); errs += 1
          sys.exit(errs)
          PYEOF
          printf '{"images":[{"filename":"msg-27x20@2x.png","idiom":"universal","platform":"ios","scale":"2x","size":"27x20"},{"filename":"msg-27x20@3x.png","idiom":"universal","platform":"ios","scale":"3x","size":"27x20"},{"filename":"msg-32x24@2x.png","idiom":"universal","platform":"ios","scale":"2x","size":"32x24"},{"filename":"msg-32x24@3x.png","idiom":"universal","platform":"ios","scale":"3x","size":"32x24"},{"filename":"msg-60x45@2x.png","idiom":"iphone","scale":"2x","size":"60x45"},{"filename":"msg-60x45@3x.png","idiom":"iphone","scale":"3x","size":"60x45"},{"filename":"msg-67x50@2x.png","idiom":"ipad","scale":"2x","size":"67x50"},{"filename":"msg-74x55@2x.png","idiom":"ipad","scale":"2x","size":"74x55"},{"filename":"appstore.png","idiom":"ios-marketing","platform":"ios","scale":"1x","size":"1024x768"}],"info":{"author":"xcode","version":1}}' \
            > "$ICON_DIR/Contents.json"

          for name in conie_lets_go conie_passed conie_you_got_this conie_studying conie_hi conie_nervous; do
            mkdir -p "$EXT_DIR/Stickers.xcstickers/${name}.sticker"
            cp "resources/stickers/${name}.png" "$EXT_DIR/Stickers.xcstickers/${name}.sticker/"
            printf '{"info":{"author":"xcode","version":1},"properties":{"filename":"%s.png"}}' \
              "$name" > "$EXT_DIR/Stickers.xcstickers/${name}.sticker/Contents.json"
          done

          ruby - << 'RUBYEOF'
          require 'xcodeproj'
          proj_path = 'ios/App/App.xcodeproj'
          project = Xcodeproj::Project.open(proj_path)
          if project.targets.any? { |t| t.name == 'StickerPackExtension' }
            puts 'Target already exists, skipping'; exit 0
          end
          main_target = project.targets.find { |t| t.name == 'App' }

          sticker_target = project.new_target(:app_extension, 'StickerPackExtension', :ios, '14.0')
          sticker_target.product_type = 'com.apple.product-type.app-extension.messages-sticker-pack'

          sticker_target.build_configurations.each do |cfg|
            cfg.build_settings.merge!(
              'PRODUCT_BUNDLE_IDENTIFIER'  => 'com.passdmv.app.StickerPackExtension',
              'PRODUCT_NAME'               => 'StickerPackExtension',
              'INFOPLIST_FILE'             => 'StickerPackExtension/Info.plist',
              'TARGETED_DEVICE_FAMILY'     => '1,2',
              'IPHONEOS_DEPLOYMENT_TARGET' => '14.0',
              'CODE_SIGN_STYLE'            => 'Manual',
              'CODE_SIGN_IDENTITY'         => 'Apple Distribution',
              'SKIP_INSTALL'               => 'NO'
            )
          end

          sticker_target.resources_build_phase.files.each(&:remove_from_project) rescue nil

          xcstickers = project.main_group.new_reference('StickerPackExtension/Stickers.xcstickers')
          xcstickers.last_known_file_type = 'folder.stickers'
          xcstickers.source_tree = 'SOURCE_ROOT'
          sticker_target.add_resources([xcstickers])

          main_target.add_dependency(sticker_target)

          embed_phase = main_target.build_phases.find { |p|
            p.is_a?(Xcodeproj::Project::Object::PBXCopyFilesBuildPhase) &&
              p.dst_subfolder_spec == '13'
          }
          unless embed_phase
            embed_phase = main_target.new_copy_files_build_phase('Embed App Extensions')
            embed_phase.dst_subfolder_spec = '13'
          end
          bf = embed_phase.add_file_reference(sticker_target.product_reference)
          bf.settings = { 'ATTRIBUTES' => ['RemoveHeadersOnCopy'] }

          project.save
          puts "xcstickers ref: path=#{xcstickers.path} src_tree=#{xcstickers.source_tree}"
          puts 'StickerPackExtension injected successfully'
          RUBYEOF

          echo "=== Verifying sticker structure ==="
          find ios/App/StickerPackExtension -type f | head -20
          echo "=== pbxproj xcstickers entries ==="
          grep "xcstickers" ios/App/App.xcodeproj/project.pbxproj | head -10
      - name: Revoke old Distribution certificates (one-time cleanup + ongoing guard)
        script: |
          set +e
          keychain initialize
          for CERT_ID in Z6T2646N57 5T68W847ZF; do
            echo "Revoking $CERT_ID"
            app-store-connect certificates revoke "$CERT_ID" 2>/dev/null || true
          done
          app-store-connect list-certificates --type DISTRIBUTION --json 2>/dev/null > /tmp/dist_certs.json || echo "[]" > /tmp/dist_certs.json
          TOTAL=$(python3 -c "import json; print(len(json.load(open('/tmp/dist_certs.json'))))" 2>/dev/null || echo "0")
          echo "Remaining Distribution certs: $TOTAL"
          if [ "$TOTAL" -ge 2 ]; then
            python3 -c "import json; certs=json.load(open('/tmp/dist_certs.json')); [print(c['id']) for c in sorted(certs, key=lambda x: x.get('attributes',{}).get('expirationDate',''))[:-1]]" 2>/dev/null > /tmp/to_revoke.txt
            while IFS= read -r cert_id; do
              [ -z "$cert_id" ] && continue
              echo "Revoking overflow: $cert_id"
              app-store-connect certificates revoke "$cert_id" || true
            done < /tmp/to_revoke.txt
          fi
          set -e
      - name: Set up code signing (create cert + profiles)
        script: |
          keychain initialize
          echo "$CERT_PRIVATE_KEY_B64" | base64 --decode > /tmp/dist_cert_key.pem
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/dist_cert_key.pem \
            --create
          app-store-connect fetch-signing-files "${BUNDLE_ID}.StickerPackExtension" \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/dist_cert_key.pem \
            --create
          keychain add-certificates
          PROFILE=""
          for p in $(find "$HOME/Library" -name "*.mobileprovision" 2>/dev/null); do
            PLIST_CONTENT=$(openssl smime -inform der -verify -noverify -in "$p" 2>/dev/null)
            APP_ID=$(echo "$PLIST_CONTENT" | python3 -c "
          import plistlib,sys
          try:
              d=plistlib.load(sys.stdin.buffer)
              print(d.get('Entitlements',{}).get('application-identifier',''))
          except: pass
          " 2>/dev/null)
            if echo "$APP_ID" | grep -qE '\.com\.passdmv\.app$'; then
              PROFILE="$p"
              echo "Found main app profile: $PROFILE (app-id: $APP_ID)"
              break
            fi
          done
          if [ -z "$PROFILE" ]; then
            PROFILE=$(find "$HOME/Library" -name "*.mobileprovision" 2>/dev/null | head -1)
            echo "Fallback profile: $PROFILE"
          fi
          if [ -z "$PROFILE" ]; then echo "ERROR: no .mobileprovision found"; exit 1; fi
          PLIST=$(openssl smime -inform der -verify -noverify -in "$PROFILE" 2>/dev/null)
          PROFILE_UUID=$(echo "$PLIST" | python3 -c "import plistlib,sys; print(plistlib.load(sys.stdin.buffer)['UUID'])")
          TEAM_ID=$(echo "$PLIST" | python3 -c "import plistlib,sys; print(plistlib.load(sys.stdin.buffer)['TeamIdentifier'][0])")
          echo "UUID=$PROFILE_UUID  TEAM=$TEAM_ID"
          echo "export PROFILE_UUID='$PROFILE_UUID'" > /tmp/signing.env
          echo "export TEAM_ID='$TEAM_ID'" >> /tmp/signing.env
          sed -i '' "s/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g" ios/App/App.xcodeproj/project.pbxproj 2>/dev/null || true
          xcode-project use-profiles
      - name: Increment build number
        script: |
          cd ios/App
          agvtool new-version -all $(($(date +%s) / 60)) || true
      - name: Build the IPA
        script: |
          source /tmp/signing.env
          echo "UUID=$PROFILE_UUID  TEAM=$TEAM_ID"
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --archive-flags "CODE_SIGN_STYLE=Manual CODE_SIGN_IDENTITY=Apple\ Distribution PROVISIONING_PROFILE=$PROFILE_UUID DEVELOPMENT_TEAM=$TEAM_ID"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: true
