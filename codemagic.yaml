workflows:
  ios-passdmv:
    name: Pass DMV iOS (App Store)
    instance_type: mac_mini_m2
    max_build_duration: 60

    # App Store Connect API key added in Codemagic UI, named exactly: PassDMV_ASC_Key
    integrations:
      app_store_connect: PassDMV_ASC_Key

    environment:
      vars:
        BUNDLE_ID: "com.passdmv.app"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_STORE_APPLE_ID: 6784378286
      node: 20
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install npm dependencies
        script: |
          npm install --legacy-peer-deps
      - name: Generate native iOS project
        script: |
          if [ ! -d "ios" ]; then npx cap add ios; fi
          npx cap sync ios
      - name: Remove Game Center entitlement (not used by this app)
        script: |
          ENTITLEMENTS="ios/App/App/App.entitlements"
          if [ -f "$ENTITLEMENTS" ]; then
            /usr/libexec/PlistBuddy -c "Delete :com.apple.developer.game-center" "$ENTITLEMENTS" 2>/dev/null || true
          fi
      - name: Generate app icon and splash
        script: |
          npx capacitor-assets generate --ios || true
      - name: Set app display name (Pass DMV)
        script: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName Pass DMV" "ios/App/App/Info.plist" || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string Pass DMV" "ios/App/App/Info.plist"
      - name: Install CocoaPods dependencies
        script: |
          cd ios/App && pod install
      - name: Manage iOS Distribution certificates (stay under Apple 2-cert limit)
        script: |
          set +e
          CERT_JSON=$(app-store-connect list-certificates --type IOS_DISTRIBUTION --json 2>/dev/null || echo "[]")
          CERT_COUNT=$(echo "$CERT_JSON" | python3 -c "import json,sys; print(len(json.load(sys.stdin)))" 2>/dev/null || echo "0")
          echo "Found $CERT_COUNT iOS Distribution certificate(s)"
          if [ "$CERT_COUNT" -ge 2 ]; then
            OLDEST_IDS=$(echo "$CERT_JSON" | python3 -c "import json,sys; certs=json.load(sys.stdin); [print(c['id']) for c in sorted(certs, key=lambda x: x.get('attributes',{}).get('expirationDate',''))[:-1]]" 2>/dev/null)
            for cert_id in $OLDEST_IDS; do
              echo "Revoking old certificate: $cert_id"
              app-store-connect certificates revoke "$cert_id" || true
            done
          fi
          set -e
      - name: Set up code signing (create cert + profile)
        script: |
          keychain initialize
          openssl genrsa -out /tmp/dist_cert_key.pem 2048
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/dist_cert_key.pem \
            --create
          keychain add-certificates

          # Extract UUID and Team ID from the installed provisioning profile
          PROF_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "Profiles in $PROF_DIR:"
          ls "$PROF_DIR" 2>/dev/null || echo "(none)"
          PROFILE=$(ls "$PROF_DIR"/*.mobileprovision 2>/dev/null | head -1)
          if [ -z "$PROFILE" ]; then
            echo "ERROR: No provisioning profile found"
            exit 1
          fi
          echo "Using profile: $PROFILE"
          PLIST=$(openssl smime -inform der -verify -noverify -in "$PROFILE" 2>/dev/null)
          PROFILE_UUID=$(echo "$PLIST" | python3 -c "import plistlib,sys; print(plistlib.load(sys.stdin.buffer)['UUID'])")
          TEAM_ID=$(echo "$PLIST" | python3 -c "import plistlib,sys; print(plistlib.load(sys.stdin.buffer)['TeamIdentifier'][0])")
          echo "Profile UUID: $PROFILE_UUID"
          echo "Team ID: $TEAM_ID"

          # Save for next step
          echo "export PROFILE_UUID='$PROFILE_UUID'" > /tmp/signing.env
          echo "export TEAM_ID='$TEAM_ID'" >> /tmp/signing.env

          # Patch project: switch Automatic -> Manual signing
          PROJECT="ios/App/App.xcodeproj/project.pbxproj"
          sed -i '' "s/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g" "$PROJECT"
          xcode-project use-profiles
      - name: Increment build number
        script: |
          cd ios/App
          agvtool new-version -all $(($(date +%s) / 60)) || true
      - name: Build the IPA
        script: |
          source /tmp/signing.env
          echo "Signing: UUID=$PROFILE_UUID  TEAM=$TEAM_ID"
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --archive-flags "CODE_SIGN_STYLE=Manual CODE_SIGN_IDENTITY=Apple\ Distribution PROVISIONING_PROFILE=$PROFILE_UUID DEVELOPMENT_TEAM=$TEAM_ID"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
